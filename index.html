<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>LockScreen Studio - Cinematic Stacked Edition</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --glass: rgba(255, 255, 255, 0.92);
      --textShadow: 0px 2px 15px rgba(0, 0, 0, 0.5);
      --mainColor: #ffffff;
      --accent: #007AFF;
      --notifRadius: 24px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      height: 100vh;
      overflow: hidden;
      font-family: 'Cairo', sans-serif;
      background: #000;
      color: var(--mainColor);
    }

    .bg-container { position: absolute; inset: 0; z-index: 1; overflow: hidden; }
    .bg-media {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: brightness(0.8);
    }

    /* Content */
    .content {
      position: relative;
      z-index: 10;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 80px;
      text-align: center;
    }

    .time {
      font-size: 110px;
      font-weight: 300;
      line-height: 1;
      text-shadow: var(--textShadow);
      letter-spacing: -2px;
    }

    .date-container { margin-top: 10px; text-shadow: var(--textShadow); }
    .date { font-size: 28px; font-weight: 600; }
    .hijri { font-size: 24px; font-weight: 500; margin-top: 2px; }

    /* Music Widget - Cinematic Stacked */
    .music-widget {
      margin-top: 25px;
      width: 92%;
      max-width: 480px;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border-radius: 28px;
      padding: 15px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      border: 1px solid rgba(255,255,255,0.15);
      box-shadow: 0 15px 35px rgba(0,0,0,0.3);
      display: none; /* Hidden by default */
    }

    .music-widget.active { display: flex; }

    .music-top { display: flex; align-items: center; gap: 15px; }
    .music-art { width: 55px; height: 55px; border-radius: 12px; background: #333; background-size: cover; }
    .music-info { flex: 1; text-align: right; }
    .music-title { font-size: 17px; font-weight: 700; }
    .music-artist { font-size: 14px; opacity: 0.7; }

    .music-progress-container { width: 100%; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; position: relative; }
    .music-progress-bar { height: 100%; background: #fff; border-radius: 2px; width: 35%; transition: width 1s linear; }

    .music-controls { display: flex; justify-content: center; gap: 30px; font-size: 22px; }

    /* Notifications Area - Stacked Logic */
    .notifications-area {
      width: 94%;
      max-width: 500px;
      margin-top: 25px;
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .notification-box {
      background: var(--glass);
      border-radius: var(--notifRadius);
      padding: 12px 18px;
      color: #000;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      transform-origin: bottom;
    }

    /* Stacked Effect */
    .notification-box:not(:first-child) {
      margin-top: -45px;
      transform: scale(0.95);
      opacity: 0.7;
      filter: blur(1px);
      z-index: -1;
    }

    .notification-box:nth-child(3) { transform: scale(0.9) translateY(10px); opacity: 0.4; z-index: -2; }

    .notif-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .notif-right { display: flex; align-items: center; gap: 6px; }
    .notif-left { display: flex; align-items: center; gap: 8px; }
    .notif-label { font-size: 17px; font-weight: 700; }
    .notif-arrow { color: #ff3b30; font-size: 17px; }
    .notif-time { font-size: 17px; font-weight: 600; }
    .notif-body { font-size: 21px; font-weight: 600; text-align: center; padding: 2px 0 8px 0; }

    /* Control Panel */
    .panel {
      position: fixed;
      bottom: 20px;
      left: 20px;
      width: 350px;
      background: rgba(0, 0, 0, 0.92);
      backdrop-filter: blur(20px);
      border-radius: 24px;
      padding: 20px;
      z-index: 1000;
      border: 1px solid rgba(255,255,255,0.1);
      color: #fff;
      max-height: 85vh;
      overflow-y: auto;
    }

    .panel.hidden { display: none; }
    .panel h2 { font-size: 18px; margin-bottom: 15px; color: var(--accent); text-align: center; }
    .panel label { display: block; font-size: 11px; opacity: 0.7; margin-top: 10px; }
    .panel input, .panel textarea, .panel select {
      width: 100%;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 10px;
      color: #fff;
      margin-top: 5px;
    }

    .panel button {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: none;
      background: var(--accent);
      color: #fff;
      font-weight: 600;
      margin-top: 12px;
      cursor: pointer;
    }

    .show-panel-btn {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 1001;
      background: rgba(0,0,0,0.6);
      color: #fff;
      padding: 10px 20px;
      border-radius: 12px;
      display: none;
      cursor: pointer;
    }

    @media (max-width: 480px) {
      .time { font-size: 90px; }
      .panel { width: calc(100% - 40px); }
    }
  </style>
</head>
<body>

  <div class="bg-container">
    <img id="bgImg" class="bg-media" src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=1080&q=80">
    <video id="bgVid" class="bg-media" style="display:none;" loop muted playsinline></video>
  </div>

  <div class="content">
    <div class="time" id="time">00:00</div>
    
    <div class="date-container">
      <div class="date" id="date">--</div>
      <div class="hijri" id="hijri">--</div>
    </div>

    <!-- Music Widget -->
    <div class="music-widget" id="musicWidget">
      <div class="music-top">
        <div class="music-art" id="musicArt"></div>
        <div class="music-info">
          <div class="music-title" id="musicTitle">اسم السورة / المقطع</div>
          <div class="music-artist" id="musicArtist">اسم القارئ / المنشد</div>
        </div>
      </div>
      <div class="music-progress-container">
        <div class="music-progress-bar" id="musicProgress"></div>
      </div>
      <div class="music-controls">
        <span>⏮</span>
        <span>⏸</span>
        <span>⏭</span>
      </div>
    </div>

    <div class="notifications-area" id="notificationsArea"></div>
  </div>

  <button class="show-panel-btn" id="showBtn" onclick="togglePanel()">⚙️ الإعدادات</button>

  <div class="panel" id="panel">
    <h2>LockScreen Cinematic Stacked</h2>
    
    <label>مشغل الموسيقى:</label>
    <select id="showMusic" onchange="toggleMusic(this.value)">
      <option value="no">إخفاء</option>
      <option value="yes">إظهار</option>
    </select>
    <input type="text" id="mTitle" placeholder="العنوان..." oninput="updateMusic()">
    <input type="text" id="mArtist" placeholder="الفنان..." oninput="updateMusic()">
    <input type="text" id="mArt" placeholder="رابط الغلاف..." oninput="updateMusic()">

    <label>نوع الخلفية:</label>
    <select id="bgType" onchange="updateBgType(this.value)">
      <option value="image">صورة</option>
      <option value="video">فيديو (خلفية حية)</option>
    </select>
    <input type="text" id="bgUrl" placeholder="الرابط هنا..." oninput="applyBg(this.value)">
    
    <label>الإشعارات (كل سطر إشعار):</label>
    <textarea id="notifList" rows="4" placeholder="اكتب هنا..."></textarea>
    
    <button onclick="startSequence()">▶ بدء العرض المتداخل</button>
    <button style="background:#555" onclick="togglePanel()">🎥 وضع التصوير</button>
    <button style="background:#ff3b30" onclick="location.reload()">🧹 إعادة ضبط</button>
  </div>

  <script>
    function updateClock() {
      const now = new Date();
      const h = String(now.getHours() % 12 || 12).padStart(2, '0');
      const m = String(now.getMinutes()).padStart(2, '0');
      document.getElementById('time').textContent = `${h}:${m}`;
      const days = ['الأحد', 'الاثنين', 'الثلاثاء', 'الأربعاء', 'الخميس', 'الجمعة', 'السبت'];
      const months = ['يناير', 'فبراير', 'مارس', 'إبريل', 'مايو', 'يونيو', 'يوليو', 'أغسطس', 'سبتمبر', 'أكتوبر', 'نوفمبر', 'ديسمبر'];
      document.getElementById('date').textContent = `${days[now.getDay()]} ,${now.getDate()} ${months[now.getMonth()]}`;
      const hijri = new Intl.DateTimeFormat('ar-SA-u-ca-islamic', {day:'numeric', month:'long', year:'numeric'}).format(now);
      document.getElementById('hijri').textContent = hijri.replace('هـ', '').trim();
    }
    setInterval(updateClock, 1000);
    updateClock();

    function toggleMusic(val) {
      document.getElementById('musicWidget').classList.toggle('active', val === 'yes');
      if(val === 'yes') startMusicProgress();
    }

    function updateMusic() {
      document.getElementById('musicTitle').textContent = document.getElementById('mTitle').value || "اسم السورة / المقطع";
      document.getElementById('musicArtist').textContent = document.getElementById('mArtist').value || "اسم القارئ / المنشد";
      const art = document.getElementById('mArt').value;
      if(art) document.getElementById('musicArt').style.backgroundImage = `url('${art}')`;
    }

    function startMusicProgress() {
      let p = 0;
      setInterval(() => {
        p = (p + 1) % 100;
        document.getElementById('musicProgress').style.width = p + '%';
      }, 1000);
    }

    function updateBgType(type) {
      document.getElementById('bgImg').style.display = type === 'image' ? 'block' : 'none';
      document.getElementById('bgVid').style.display = type === 'video' ? 'block' : 'none';
    }

    function applyBg(url) {
      const type = document.getElementById('bgType').value;
      if(type === 'video') {
        const v = document.getElementById('bgVid'); v.src = url; v.play().catch(()=>{});
      } else {
        document.getElementById('bgImg').src = url;
      }
    }

    function addNotification(text) {
      const area = document.getElementById('notificationsArea');
      const box = document.createElement('div');
      box.className = 'notification-box';
      const now = new Date();
      const h = now.getHours() % 12 || 12;
      const m = String(now.getMinutes()).padStart(2, '0');
      const ampm = now.getHours() >= 12 ? 'م' : 'ص';

      box.innerHTML = `
        <div class="notif-top">
          <div class="notif-right"><span class="notif-label">الآن</span><span class="notif-arrow">⬇</span></div>
          <div class="notif-left"><span class="notif-time">${h}:${m} ${ampm}</span></div>
        </div>
        <div class="notif-body">${text}</div>
      `;
      area.prepend(box);
      if(area.children.length > 3) area.lastChild.remove();
    }

    let timer = null;
    function startSequence() {
      const list = document.getElementById('notifList').value.split('\n').filter(t => t.trim());
      if(list.length === 0) return;
      let i = 0;
      if(timer) clearInterval(timer);
      addNotification(list[i++]);
      timer = setInterval(() => {
        if(i >= list.length) i = 0;
        addNotification(list[i++]);
      }, 4000);
      togglePanel();
    }

    function togglePanel() {
      const p = document.getElementById('panel');
      const b = document.getElementById('showBtn');
      p.classList.toggle('hidden');
      b.style.display = p.classList.contains('hidden') ? 'block' : 'none';
    }
  </script>
</body>
</html>
