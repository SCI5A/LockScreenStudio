<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>LockScreen Studio - Exact Match</title>
  
  <!-- Google Fonts: Cairo for Arabic Text -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --glass: rgba(255, 255, 255, 0.92);
      --textShadow: 0px 2px 15px rgba(0, 0, 0, 0.5);
    }

    * { 
      box-sizing: border-box; 
      margin: 0;
      padding: 0;
    }

    body {
      height: 100vh;
      overflow: hidden;
      font-family: 'Cairo', sans-serif;
      background: #000;
      color: #fff;
    }

    /* Background */
    .bg-container {
      position: absolute;
      inset: 0;
      z-index: 1;
    }

    .bg-image {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      background-size: cover;
      background-position: center;
      filter: brightness(0.8);
    }

    /* Main Content */
    .content {
      position: relative;
      z-index: 10;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 100px;
      text-align: center;
    }

    .time {
      font-size: 110px;
      font-weight: 300; /* Thin as in image */
      line-height: 1;
      text-shadow: var(--textShadow);
      letter-spacing: -2px;
    }

    .date-container {
      margin-top: 15px;
      text-shadow: var(--textShadow);
    }

    .date {
      font-size: 32px;
      font-weight: 600;
    }

    .hijri {
      font-size: 28px;
      font-weight: 500;
      margin-top: 5px;
    }

    /* Notifications Area */
    .notifications-area {
      width: 94%;
      max-width: 500px;
      margin-top: 40px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .notification-box {
      background: var(--glass);
      border-radius: 24px;
      padding: 12px 18px;
      color: #000;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      animation: notifIn 0.5s ease-out forwards;
      position: relative;
    }

    .notif-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .notif-right {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .notif-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .notif-label {
      font-size: 18px;
      font-weight: 700;
    }

    .notif-arrow {
      color: #ff3b30;
      font-size: 18px;
    }

    .notif-icon-msg {
      width: 24px;
      height: 24px;
      opacity: 0.3;
    }

    .notif-time {
      font-size: 18px;
      font-weight: 600;
    }

    .notif-more {
      width: 24px;
      height: 24px;
      background: #e5e5ea;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: bold;
      color: #8e8e93;
    }

    .notif-body {
      font-size: 22px;
      font-weight: 600;
      text-align: center;
      padding: 5px 0 10px 0;
      word-wrap: break-word;
    }

    .no-old-text {
      margin-top: 15px;
      font-size: 24px;
      font-weight: 500;
      opacity: 0.9;
      text-shadow: var(--textShadow);
    }

    @keyframes notifIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    /* Control Panel */
    .panel {
      position: fixed;
      bottom: 20px;
      left: 20px;
      width: 320px;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 15px;
      z-index: 1000;
      border: 1px solid rgba(255,255,255,0.1);
      color: #fff;
    }

    .panel.hidden { display: none; }

    .panel h2 { font-size: 16px; margin-bottom: 10px; color: #007AFF; }
    .panel label { display: block; font-size: 11px; opacity: 0.7; margin-top: 8px; }
    .panel input, .panel textarea {
      width: 100%;
      background: rgba(255,255,255,0.1);
      border: none;
      border-radius: 8px;
      padding: 8px;
      color: #fff;
      margin-top: 4px;
    }

    .panel button {
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: none;
      background: #007AFF;
      color: #fff;
      font-weight: 600;
      margin-top: 10px;
      cursor: pointer;
    }

    .show-panel-btn {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 1001;
      background: rgba(0,0,0,0.5);
      color: #fff;
      border: none;
      padding: 8px 15px;
      border-radius: 10px;
      display: none;
    }

    @media (max-width: 480px) {
      .time { font-size: 90px; }
      .date { font-size: 28px; }
      .hijri { font-size: 24px; }
      .notif-body { font-size: 20px; }
    }
  </style>
</head>
<body>

  <div class="bg-container">
    <div class="bg-image" id="bgImage"></div>
  </div>

  <div class="content">
    <div class="time" id="time">12:03</div>
    <div class="date-container">
      <div class="date" id="date">الخميس ,30 إبريل</div>
      <div class="hijri" id="hijri">13 ,ذو القعده, 1447</div>
    </div>

    <div class="notifications-area" id="notificationsArea"></div>
    <div class="no-old-text" id="noOldText">لاتوجد إشعارات قديمه</div>
  </div>

  <button class="show-panel-btn" id="showBtn" onclick="togglePanel()">إظهار الإعدادات</button>

  <div class="panel" id="panel">
    <h2>إعدادات شاشة القفل</h2>
    
    <label>رابط الخلفية:</label>
    <input type="text" id="bgUrl" placeholder="https://..." oninput="updateBg(this.value)">
    
    <label>الإشعارات (كل سطر إشعار):</label>
    <textarea id="notifList" rows="5" placeholder="اكتب هنا..."></textarea>
    
    <label>الفاصل الزمني (ثواني):</label>
    <input type="number" id="gap" value="3">

    <button onclick="startSequence()">▶ بدء العرض</button>
    <button style="background:#555" onclick="togglePanel()">🎥 وضع التصوير</button>
    <button style="background:#ff3b30" onclick="clearAll()">🧹 مسح الكل</button>
  </div>

  <script>
    function updateClock() {
      const now = new Date();
      const h = String(now.getHours() % 12 || 12).padStart(2, '0');
      const m = String(now.getMinutes()).padStart(2, '0');
      document.getElementById('time').textContent = `${h}:${m}`;

      const days = ['الأحد', 'الاثنين', 'الثلاثاء', 'الأربعاء', 'الخميس', 'الجمعة', 'السبت'];
      const months = ['يناير', 'فبراير', 'مارس', 'إبريل', 'مايو', 'يونيو', 'يوليو', 'أغسطس', 'سبتمبر', 'أكتوبر', 'نوفمبر', 'ديسمبر'];
      
      const dayName = days[now.getDay()];
      const dayNum = now.getDate();
      const monthName = months[now.getMonth()];
      
      document.getElementById('date').textContent = `${dayName} ,${dayNum} ${monthName}`;

      // Simple Hijri (Approximate for UI)
      const hijri = new Intl.DateTimeFormat('ar-SA-u-ca-islamic', {day:'numeric', month:'long', year:'numeric'}).format(now);
      document.getElementById('hijri').textContent = hijri.replace('هـ', '').trim();
    }
    setInterval(updateClock, 1000);
    updateClock();

    function updateBg(url) {
      if(url) document.getElementById('bgImage').style.backgroundImage = `url('${url}')`;
    }

    function addNotification(text) {
      const area = document.getElementById('notificationsArea');
      const box = document.createElement('div');
      box.className = 'notification-box';
      
      const now = new Date();
      const h = now.getHours() % 12 || 12;
      const m = String(now.getMinutes()).padStart(2, '0');
      const ampm = now.getHours() >= 12 ? 'م' : 'ص';
      const timeStr = `${h}:${m} ${ampm}`;

      box.innerHTML = `
        <div class="notif-top">
          <div class="notif-right">
            <span class="notif-label">الآن</span>
            <span class="notif-arrow">⬇</span>
            <svg class="notif-icon-msg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
            </svg>
          </div>
          <div class="notif-left">
            <span class="notif-time">${timeStr}</span>
            <div class="notif-more">...</div>
          </div>
        </div>
        <div class="notif-body">${text}</div>
      `;

      area.prepend(box);
      if(area.children.length > 4) area.lastChild.remove();
    }

    let timer = null;
    function startSequence() {
      const list = document.getElementById('notifList').value.split('\n').filter(t => t.trim());
      if(list.length === 0) return;
      
      let i = 0;
      if(timer) clearInterval(timer);
      
      addNotification(list[i++]);
      timer = setInterval(() => {
        if(i >= list.length) i = 0;
        addNotification(list[i++]);
      }, document.getElementById('gap').value * 1000);
      
      togglePanel();
    }

    function togglePanel() {
      const p = document.getElementById('panel');
      const b = document.getElementById('showBtn');
      p.classList.toggle('hidden');
      b.style.display = p.classList.contains('hidden') ? 'block' : 'none';
    }

    function clearAll() {
      document.getElementById('notificationsArea').innerHTML = '';
      document.getElementById('notifList').value = '';
      if(timer) clearInterval(timer);
    }

    // Default Background
    updateBg("https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=1080&q=80");
  </script>
</body>
</html>
