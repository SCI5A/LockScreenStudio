<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>LockScreen Studio Pro - Cinematic Edition</title>
  
  <!-- Google Fonts: Cairo for Arabic Text -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --glass: rgba(255, 255, 255, 0.15);
      --glassBorder: rgba(255, 255, 255, 0.2);
      --textShadow: 0px 4px 20px rgba(0, 0, 0, 0.6);
      --accent: #007AFF;
    }

    * { 
      box-sizing: border-box; 
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      font-family: 'Cairo', system-ui, -apple-system, sans-serif;
      background: #000;
      color: #fff;
    }

    /* Background with Ken Burns Effect */
    .bg-container {
      position: absolute;
      inset: 0;
      z-index: 1;
      overflow: hidden;
    }

    .bg-image {
      position: absolute;
      inset: -10%;
      width: 120%;
      height: 120%;
      background-size: cover;
      background-position: center;
      filter: brightness(0.7) contrast(1.1);
      animation: kenBurns 40s ease-in-out infinite alternate;
    }

    @keyframes kenBurns {
      0% { transform: scale(1) translate(0, 0); }
      100% { transform: scale(1.15) translate(-2%, -2%); }
    }

    /* Cinematic Overlays */
    .dark-overlay {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, transparent, rgba(0,0,0,0.4));
      z-index: 2;
    }

    .film-grain {
      position: absolute;
      inset: 0;
      z-index: 3;
      pointer-events: none;
      opacity: 0.05;
      background-image: url("https://grainy-gradients.vercel.app/noise.svg");
      mix-blend-mode: overlay;
    }

    /* Dust Particles */
    #particles-js {
      position: absolute;
      width: 100%;
      height: 100%;
      z-index: 4;
      pointer-events: none;
    }

    /* Main Content */
    .content {
      position: relative;
      z-index: 10;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 80px;
      text-align: center;
      text-shadow: var(--textShadow);
    }

    .lock-icon {
      font-size: 24px;
      margin-bottom: 10px;
      opacity: 0.9;
      animation: fadeIn 1s ease;
    }

    .time {
      font-size: 100px;
      font-weight: 700;
      line-height: 1;
      letter-spacing: -2px;
    }

    .date-container {
      margin-top: 5px;
    }

    .date {
      font-size: 24px;
      font-weight: 400;
      opacity: 0.95;
    }

    .hijri {
      font-size: 18px;
      opacity: 0.8;
      margin-top: 4px;
    }

    /* Music Widget */
    .music-widget {
      margin-top: 30px;
      width: 90%;
      max-width: 400px;
      background: var(--glass);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 24px;
      padding: 15px;
      display: flex;
      align-items: center;
      gap: 15px;
      border: 1px solid var(--glassBorder);
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      animation: slideUp 1s ease;
      display: none; /* Hidden by default */
    }

    .music-widget.active { display: flex; }

    .music-art {
      width: 50px;
      height: 50px;
      border-radius: 8px;
      background: #333;
      background-size: cover;
    }

    .music-info {
      flex: 1;
      text-align: right;
    }

    .music-title { font-size: 16px; font-weight: 700; }
    .music-artist { font-size: 13px; opacity: 0.7; }

    .music-controls {
      display: flex;
      gap: 10px;
      font-size: 18px;
    }

    /* Notifications Area */
    .notifications-area {
      width: 92%;
      max-width: 480px;
      margin-top: 30px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .notification-box {
      background: var(--glass);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border-radius: 20px;
      padding: 12px 16px;
      border: 1px solid var(--glassBorder);
      box-shadow: 0 8px 25px rgba(0,0,0,0.2);
      animation: notifIn 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards;
      color: #fff;
      text-align: right;
    }

    .notif-header {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      opacity: 0.7;
      margin-bottom: 6px;
    }

    .notif-icon {
      width: 18px;
      height: 18px;
      border-radius: 4px;
      background-size: cover;
    }

    .notif-body {
      font-size: 18px;
      font-weight: 500;
      line-height: 1.4;
    }

    @keyframes notifIn {
      from { transform: translateY(-20px) scale(0.95); opacity: 0; }
      to { transform: translateY(0) scale(1); opacity: 1; }
    }

    /* Swipe Bar */
    .swipe-bar {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 5px;
      background: rgba(255,255,255,0.5);
      border-radius: 10px;
      z-index: 10;
    }

    /* Control Panel */
    .panel {
      position: fixed;
      bottom: 20px;
      left: 20px;
      width: 350px;
      max-height: 80vh;
      background: rgba(20, 20, 20, 0.95);
      backdrop-filter: blur(15px);
      border-radius: 24px;
      padding: 20px;
      z-index: 1000;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 20px 50px rgba(0,0,0,0.8);
      overflow-y: auto;
      transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .panel.minimized {
      transform: translateX(-120%);
    }

    .panel h2 { margin: 0 0 15px; font-size: 18px; color: var(--accent); }
    
    .panel-section {
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .panel label { display: block; font-size: 12px; opacity: 0.6; margin-bottom: 5px; }
    
    .panel input, .panel textarea, .panel select {
      width: 100%;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 10px;
      color: #fff;
      font-family: inherit;
      margin-bottom: 10px;
    }

    .panel button {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: none;
      background: var(--accent);
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 8px;
      transition: 0.2s;
    }

    .panel button:hover { opacity: 0.9; transform: scale(0.98); }
    .panel button.secondary { background: rgba(255,255,255,0.1); }

    .toggle-panel-btn {
      position: fixed;
      bottom: 20px;
      left: 20px;
      z-index: 1001;
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 10px 20px;
      border-radius: 50px;
      font-weight: 600;
      display: none;
      box-shadow: 0 5px 15px rgba(0,122,255,0.4);
    }

    /* Animations */
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    /* Mobile Adjustments */
    @media (max-width: 480px) {
      .time { font-size: 80px; }
      .panel { width: calc(100% - 40px); }
    }
  </style>
</head>
<body>

  <div class="bg-container">
    <div class="bg-image" id="bgImage"></div>
  </div>

  <div class="dark-overlay"></div>
  <div class="film-grain"></div>
  <div id="particles-js"></div>

  <div class="content">
    <div class="lock-icon">🔒</div>
    <div class="time" id="time">00:00</div>
    <div class="date-container">
      <div class="date" id="date">--</div>
      <div class="hijri" id="hijri">--</div>
    </div>

    <!-- Music Widget -->
    <div class="music-widget" id="musicWidget">
      <div class="music-art" id="musicArt"></div>
      <div class="music-info">
        <div class="music-title" id="musicTitle">اسم السورة / المقطع</div>
        <div class="music-artist" id="musicArtist">اسم القارئ / المنشد</div>
      </div>
      <div class="music-controls">
        <span>⏮</span>
        <span>⏸</span>
        <span>⏭</span>
      </div>
    </div>

    <div class="notifications-area" id="notificationsArea"></div>
  </div>

  <div class="swipe-bar"></div>

  <button class="toggle-panel-btn" id="showPanelBtn" onclick="togglePanel()">إظهار الإعدادات</button>

  <div class="panel" id="panel">
    <h2>LockScreen Studio Pro</h2>
    
    <div class="panel-section">
      <label>الخلفية (رابط صورة):</label>
      <input type="text" id="bgUrl" placeholder="https://..." oninput="updateBg(this.value)">
      <label>أو من جهازك:</label>
      <input type="file" accept="image/*" onchange="handleFile(this)">
    </div>

    <div class="panel-section">
      <label>مشغل الموسيقى:</label>
      <select id="showMusic" onchange="toggleMusicWidget(this.value)">
        <option value="no">إخفاء</option>
        <option value="yes">إظهار</option>
      </select>
      <input type="text" id="mTitle" placeholder="العنوان..." oninput="updateMusic()">
      <input type="text" id="mArtist" placeholder="الفنان..." oninput="updateMusic()">
      <input type="text" id="mArt" placeholder="رابط الغلاف..." oninput="updateMusic()">
    </div>

    <div class="panel-section">
      <label>الإشعارات (كل سطر إشعار):</label>
      <textarea id="notifList" rows="4" placeholder="اكتب الإشعارات هنا..."></textarea>
      <div style="display:flex; gap:10px">
        <div>
          <label>الفاصل (ث):</label>
          <input type="number" id="gap" value="3" min="1">
        </div>
        <div>
          <label>المدة (ث):</label>
          <input type="number" id="life" value="8" min="2">
        </div>
      </div>
      <button onclick="startSequence()">▶ بدء العرض التلقائي</button>
      <button class="secondary" onclick="stopSequence()">⏹ إيقاف</button>
    </div>

    <button class="secondary" onclick="togglePanel()">🎥 وضع التصوير (إخفاء)</button>
    <button class="secondary" onclick="goFullscreen()">⛶ ملء الشاشة</button>
    <button class="secondary" style="color:#ff4444" onclick="clearAll()">🧹 مسح الكل</button>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
  <script>
    // Initialize Particles
    particlesJS('particles-js', {
      "particles": {
        "number": { "value": 40, "density": { "enable": true, "value_area": 800 } },
        "color": { "value": "#ffffff" },
        "opacity": { "value": 0.2, "random": true },
        "size": { "value": 3, "random": true },
        "line_linked": { "enable": false },
        "move": { "enable": true, "speed": 0.5, "direction": "top", "random": true, "straight": false, "out_mode": "out" }
      },
      "interactivity": { "events": { "onhover": { "enable": false } } }
    });

    // Clock Logic
    function updateClock() {
      const now = new Date();
      const h = String(now.getHours()).padStart(2, '0');
      const m = String(now.getMinutes()).padStart(2, '0');
      document.getElementById('time').textContent = `${h}:${m}`;

      const options = { weekday: 'long', day: 'numeric', month: 'long' };
      document.getElementById('date').textContent = now.toLocaleDateString('ar-EG', options);

      const hijri = new Intl.DateTimeFormat('ar-SA-u-ca-islamic', {day:'numeric', month:'long', year:'numeric'}).format(now);
      document.getElementById('hijri').textContent = hijri;
    }
    setInterval(updateClock, 1000);
    updateClock();

    // Background Logic
    const DEFAULT_BG = "https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=1920&q=80";
    function updateBg(url) {
      if(!url) url = DEFAULT_BG;
      document.getElementById('bgImage').style.backgroundImage = `url('${url}')`;
      localStorage.setItem('ls_bg', url);
    }

    function handleFile(input) {
      const file = input.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (e) => {
          document.getElementById('bgImage').style.backgroundImage = `url('${e.target.result}')`;
        };
        reader.readAsDataURL(file);
      }
    }

    // Music Logic
    function toggleMusicWidget(val) {
      const w = document.getElementById('musicWidget');
      val === 'yes' ? w.classList.add('active') : w.classList.remove('active');
    }

    function updateMusic() {
      document.getElementById('musicTitle').textContent = document.getElementById('mTitle').value || "اسم السورة / المقطع";
      document.getElementById('musicArtist').textContent = document.getElementById('mArtist').value || "اسم القارئ / المنشد";
      const art = document.getElementById('mArt').value;
      if(art) document.getElementById('musicArt').style.backgroundImage = `url('${art}')`;
    }

    // Notification Logic
    let sequenceTimer = null;
    function addNotification(text) {
      const area = document.getElementById('notificationsArea');
      const box = document.createElement('div');
      box.className = 'notification-box';
      
      const now = new Date();
      const timeStr = now.getHours() + ":" + String(now.getMinutes()).padStart(2, '0');

      box.innerHTML = `
        <div class="notif-header">
          <div class="notif-icon" style="background-image: url('https://cdn-icons-png.flaticon.com/512/733/733585.png')"></div>
          <span>الآن</span>
          <span style="margin-right: auto">${timeStr}</span>
        </div>
        <div class="notif-body">${text}</div>
      `;

      area.prepend(box);

      // Auto remove
      const life = document.getElementById('life').value * 1000;
      setTimeout(() => {
        box.style.opacity = '0';
        box.style.transform = 'scale(0.9) translateY(10px)';
        box.style.transition = '0.5s';
        setTimeout(() => box.remove(), 500);
      }, life);

      // Limit count
      if(area.children.length > 5) area.lastChild.remove();
    }

    function startSequence() {
      stopSequence();
      const list = document.getElementById('notifList').value.split('\n').filter(t => t.trim());
      if(list.length === 0) return alert("اكتب بعض الإشعارات أولاً");
      
      let i = 0;
      const gap = document.getElementById('gap').value * 1000;
      
      addNotification(list[i]);
      i++;

      sequenceTimer = setInterval(() => {
        if(i >= list.length) i = 0;
        addNotification(list[i]);
        i++;
      }, gap);
      
      togglePanel(); // Hide panel when starting
    }

    function stopSequence() {
      clearInterval(sequenceTimer);
    }

    // UI Logic
    function togglePanel() {
      const p = document.getElementById('panel');
      const b = document.getElementById('showPanelBtn');
      p.classList.toggle('minimized');
      b.style.display = p.classList.contains('minimized') ? 'block' : 'none';
    }

    function goFullscreen() {
      if (!document.fullscreenElement) document.documentElement.requestFullscreen();
      else document.exitFullscreen();
    }

    function clearAll() {
      document.getElementById('notificationsArea').innerHTML = '';
      localStorage.clear();
      location.reload();
    }

    // Load saved data
    window.onload = () => {
      const savedBg = localStorage.getItem('ls_bg');
      updateBg(savedBg || DEFAULT_BG);
      if(savedBg) document.getElementById('bgUrl').value = savedBg;
    };
  </script>
</body>
</html>
